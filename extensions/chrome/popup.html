<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stipendio Netto Calcolatore</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="icons/icon48.png" alt="Logo" class="logo">
            <h1>Stipendio Netto</h1>
        </header>

        <main>
            <div class="input-section">
                <div class="input-group">
                    <label for="ral">Reddito Annuo Lordo (RAL)</label>
                    <input type="number" id="ral" placeholder="es. 30000" step="1000">
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="region">Regione</label>
                        <select id="region"></select>
                    </div>
                    <div class="input-group">
                        <label for="months">Mensilità</label>
                        <select id="months">
                            <option value="12">12</option>
                            <option value="13" selected>13</option>
                            <option value="14">14</option>
                        </select>
                    </div>
                </div>

                <details class="advanced-settings">
                    <summary>Impostazioni Avanzate</summary>
                    <div class="advanced-grid">
                        <div class="input-group">
                            <label for="municipalTax">Addizionale Com. (%)</label>
                            <input type="number" id="municipalTax" value="0.8" step="0.1">
                        </div>
                        <div class="input-group">
                            <label for="inpsRate">Aliquota INPS (%)</label>
                            <input type="number" id="inpsRate" value="9.19" step="0.01">
                        </div>
                        <div class="input-group-check">
                            <input type="checkbox" id="hasSpouse">
                            <label for="hasSpouse">Coniuge a carico</label>
                        </div>
                        <div class="input-group">
                            <label for="childrenCount">Figli a carico</label>
                            <input type="number" id="childrenCount" value="0" min="0">
                        </div>
                        <div class="input-group">
                            <label for="bonusOption">Bonus 100€</label>
                            <select id="bonusOption">
                                <option value="Automatico">Automatico</option>
                                <option value="Forza Sì">Forza Sì</option>
                                <option value="Forza No">Forza No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="welfare">Welfare (€)</label>
                            <input type="number" id="welfare" value="0" min="0">
                        </div>
                    </div>
                </details>

                <button id="calculateBtn">Calcola</button>
            </div>

            <div id="results" class="results-section hidden">
                <div class="result-card primary">
                    <span class="label">NETTO MENSILE</span>
                    <span id="monthlyNet" class="value">€ 0.00</span>
                </div>
                <div class="result-grid">
                    <div class="result-item">
                        <span class="label">Netto Annuo</span>
                        <span id="annualNet" class="value-small">€ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">Contributi INPS</span>
                        <span id="inpsTotal" class="value-small">€ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">IRPEF Lorda</span>
                        <span id="irpefTotal" class="value-small">€ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">Addizionali</span>
                        <span id="taxesTotal" class="value-small">€ 0.00</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 NBK - Stipendio Netto Calcolatore</p>
        </footer>
    </div>
    <script src="calculator.js"></script>
    <script src="popup.js"></script>
</body>
</html>
